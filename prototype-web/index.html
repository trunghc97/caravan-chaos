<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f4c5c" />
    <title>Caravan Chaos Prototype</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar">
        <div class="brand-lockup" aria-label="Caravan Chaos">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 48 48">
              <path d="M24 4 38 10v12c0 10-5.8 17.2-14 22C15.8 39.2 10 32 10 22V10L24 4Z" />
              <path d="M17 25h14M18 18h12M21 12h6" />
              <circle cx="18" cy="31" r="2.5" />
              <circle cx="30" cy="31" r="2.5" />
            </svg>
          </span>
          <div>
            <h1>Caravan Chaos</h1>
            <p id="roundLabel">Ngày 1</p>
          </div>
        </div>
        <div class="coin-pill" aria-live="polite">
          <span id="coinValue">24</span>
          <small>dinar</small>
        </div>
      </header>

      <main class="game-layout">
        <section class="board-panel" aria-label="Bàn đua">
          <div class="race-strip">
            <div>
              <span class="eyebrow">Dẫn đầu</span>
              <strong id="leaderName">-</strong>
            </div>
            <div>
              <span class="eyebrow">Gió</span>
              <strong id="windCount">5/5</strong>
            </div>
            <div>
              <span class="eyebrow">Đích</span>
              <strong>Ô 15</strong>
            </div>
          </div>
          <div id="track" class="track-grid" aria-live="polite"></div>
        </section>

        <section class="control-dock" aria-label="Bảng điều khiển">
          <div class="tab-list" role="tablist" aria-label="Chế độ">
            <button class="tab-button is-active" type="button" data-tab="action">Lượt</button>
            <button class="tab-button" type="button" data-tab="contracts">Hợp đồng</button>
            <button class="tab-button" type="button" data-tab="ledger">Sổ cái</button>
          </div>
          <div id="panelContent" class="panel-content"></div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
