services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: caravan_chaos
      POSTGRES_USER: caravan
      POSTGRES_PASSWORD: caravan
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
